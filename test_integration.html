<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON 解析功能测试</title>
    <link rel="stylesheet" href="app/static/css/style.css">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
</head>
<body>
    <div style="max-width: 800px; margin: 2rem auto; padding: 2rem;">
        <h1>JSON 解析功能测试</h1>
        
        <!-- JSON 自动解析区域 -->
        <div class="form-callout form-callout-success" style="margin-bottom: 1.5rem;">
            <div class="form-callout-title">🚀 快速解析 JSON</div>
            <p>从 <code>https://chatgpt.com/api/auth/session</code> 复制 JSON 数据，一键自动填充所有字段</p>
            <div class="form-group" style="margin-bottom: 1rem;">
                <textarea id="jsonParseInput" class="form-control" rows="4" 
                    placeholder='粘贴从 https://chatgpt.com/api/auth/session 获取的 JSON 数据，例如：
{
  "user": {"email": "your@email.com"},
  "accessToken": "eyJ...",
  "sessionToken": "eyJ..."
}'></textarea>
            </div>
            <div style="display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap;">
                <button type="button" class="btn btn-success btn-sm" onclick="parseAndFillJSON()">
                    <i data-lucide="zap" style="width: 14px; height: 14px;"></i> 解析并填充
                </button>
                <button type="button" class="btn btn-secondary btn-sm" onclick="openOfficialAPI()">
                    <i data-lucide="external-link" style="width: 14px; height: 14px;"></i> 打开 API 页面
                </button>
                <button type="button" class="btn btn-outline btn-sm" onclick="clearAllFields()">
                    <i data-lucide="trash-2" style="width: 14px; height: 14px;"></i> 清空所有字段
                </button>
            </div>
            <div id="parseResult" style="margin-top: 0.5rem; font-size: 0.875rem;"></div>
        </div>
        
        <form id="singleImportForm">
            <div class="form-group">
                <label>邮箱</label>
                <input type="email" name="email" class="form-control" placeholder="admin@example.com">
            </div>
            
            <div class="form-group">
                <label>Access Token (AT)</label>
                <input type="text" name="accessToken" class="form-control" placeholder="eyJhbGciOiJSUzI1Ni...">
            </div>
            
            <div class="form-group">
                <label>Session Token (ST)</label>
                <input type="text" name="sessionToken" class="form-control" placeholder="eyJ...">
            </div>
            
            <div class="form-group">
                <label>Refresh Token (RT)</label>
                <input type="text" name="refreshToken" class="form-control" placeholder="rt-...">
            </div>
            
            <div class="form-group">
                <label>Client ID</label>
                <input type="text" name="clientId" class="form-control" placeholder="app_...">
            </div>
            
            <div class="form-group">
                <label>Account ID</label>
                <input type="text" name="accountId" class="form-control" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx">
            </div>
        </form>
    </div>
    
    <div id="toast" class="toast"></div>
    
    <script src="app/static/js/main.js"></script>
    <script>
        // 初始化 Lucide 图标
        if (window.lucide) {
            lucide.createIcons();
        }
    </script>
</body>
</html>
